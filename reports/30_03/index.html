<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marlon Hoffstadt — Weekly Report w/c 2026-03-23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #000000;
    --surface: #131313;
    --surface-elevated: #1a1a1a;
    --border: #1e1e1e;
    --border-light: #2a2a2a;
    --accent: #C9952A;
    --accent-dim: rgba(201, 149, 42, 0.15);
    --positive: #C9952A;
    --negative: #ff4444;
    --text-primary: #ffffff;
    --text-secondary: #999999;
    --text-tertiary: #666666;
    --font-display: 'Bebas Neue', Impact, sans-serif;
    --font-data: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --nav-height: 56px;
    --page-pad: 64px;
}

html {
    font-size: 15px;
    scroll-behavior: smooth;
    scroll-padding-top: var(--nav-height);
}

body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* ── Sticky Nav ───────────────────────────────────────────────── */

.report-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--nav-height);
    padding: 0 var(--page-pad);
    background: transparent;
    border-bottom: 1px solid var(--border);
}

.nav-back {
    display: flex;
    align-items: center;
    color: var(--text-tertiary);
    text-decoration: none;
    margin-right: 8px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.2s;
}

.nav-back:hover {
    color: var(--text-primary);
}

.nav-brand {
    font-family: var(--font-data);
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    transition: color 0.2s;
}

.nav-brand:hover {
    color: var(--text-primary);
}

.nav-logo {
    height: 24px;
    width: auto;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-link {
    font-family: var(--font-data);
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
}

.nav-link:hover {
    color: var(--text-primary);
}

.nav-link.active {
    color: var(--accent);
}

/* ── Hero Section (full-viewport slide) ───────────────────────── */

.report-hero {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;
    background: var(--bg);
}

/* Full-width background image */
.report-hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
}

/* Frosted glass overlay — right half, sharp edge.
   --hero-blur (px) and --hero-brightness control intensity from JS. */
.report-hero-frost {
    position: absolute;
    inset: 0;
    left: 50%;
    background: rgba(0, 0, 0, 0.08);
    backdrop-filter: blur(var(--hero-blur, 32px)) brightness(var(--hero-brightness, 0.92)) saturate(0.5);
    -webkit-backdrop-filter: blur(var(--hero-blur, 32px)) brightness(var(--hero-brightness, 0.92)) saturate(0.5);
}

/* Subtle bottom gradient for text legibility */
.report-hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.075) 50%,
        rgba(0,0,0,0.35) 80%,
        rgba(0,0,0,0.475) 100%
    );
    z-index: 1;
}

.report-hero-content {
    position: relative;
    z-index: 2;
    padding: calc(var(--nav-height) + 32px) var(--page-pad) 64px;
    max-width: 50%;
}

/* Overview highlights — right side of hero */
.hero-highlights {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 50%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: calc(var(--nav-height) + 32px) var(--page-pad) 64px calc(var(--page-pad) / 2);
    gap: 24px;
}

.hero-highlight-card {
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding-bottom: 20px;
}

.hero-highlight-value {
    font-family: var(--font-display);
    font-size: 2.6rem;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 6px;
}

.hero-highlight-delta {
    font-family: var(--font-data);
    font-size: 1rem;
    font-weight: 600;
    margin-left: 12px;
    vertical-align: middle;
}

.hero-highlight-delta.positive { color: var(--positive); }
.hero-highlight-delta.negative { color: var(--negative); }

.hero-highlight-label {
    font-family: var(--font-data);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.hero-highlight-custom {
    font-family: var(--font-body);
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--text-primary);
    padding-bottom: 16px;
}
.hero-highlight-custom-header {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.hero-highlight-custom-sep {
    font-weight: 700;
}
.hero-highlight-custom-text {
    font-weight: 400;
    color: rgba(255,255,255,0.75);
}

.report-artist-name {
    font-family: var(--font-display);
    font-size: 7rem;
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    text-transform: uppercase;
    margin-bottom: 16px;
}

.report-song-name {
    font-family: 'Bebas Neue', var(--font-heading);
    font-size: 2rem;
    color: var(--text-primary);
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 8px;
}

.report-campaign {
    font-family: var(--font-data);
    font-size: 1.6rem;
    color: var(--text-primary);
    font-weight: 700;
    margin-bottom: 8px;
}

.report-week {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

/* ── Section container ────────────────────────────────────────── */

.report-section {
    min-height: 100vh;
    padding: 64px var(--page-pad);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.report-section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
}

.report-section-number {
    font-family: var(--font-display);
    font-size: 4rem;
    color: var(--accent);
    line-height: 1;
}

.report-section-divider {
    font-family: var(--font-data);
    font-size: 0.9rem;
    color: var(--text-tertiary);
}

.report-section-title {
    font-family: var(--font-data);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    font-weight: 500;
}

.report-section-content {
    flex: 1;
}

.section-empty {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

/* Divider between sub-sections within a section */
.subsection-divider {
    height: 1px;
    background: var(--border);
    margin: 40px 0;
}

/* ── 01 Numbers ───────────────────────────────────────────────── */

#numbers {
    background: #DBDCD6;
    color: #000000;
    border-top-color: #c5c6c1;
}

#numbers .report-section-number {
    color: var(--accent);
}

#numbers .report-section-divider,
#numbers .report-section-title {
    color: #666666;
}

#numbers {
    min-height: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
}

#numbers .report-section-header {
    grid-column: 1;
    grid-row: 1;
    margin-bottom: 0;
    align-self: start;
}

#numbers .report-section-content {
    grid-column: 1 / -1;
    grid-row: 1;
}

.numbers-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
}

/* ── Platform breakdown — centred in right half ── */

.numbers-breakdown {
    grid-column: 2;
    grid-row: 1;
    align-self: start;
    justify-self: center;
    width: 100%;
    max-width: 440px;
    padding: 0 32px;
    margin-top: 52px;
}

.numbers-breakdown-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 12px;
    margin: 0 -12px;
    border-bottom: 1px solid #c5c6c1;
    transition: background 0.2s;
    border-radius: 2px;
}

.numbers-breakdown-row:hover {
    background: rgba(0,0,0,0.04);
}

.numbers-breakdown-row:first-child {
    border-top: 1px solid #c5c6c1;
}

.numbers-breakdown-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    color: #000000;
    opacity: 0.5;
    display: flex;
    align-items: center;
}

.numbers-breakdown-label {
    font-family: var(--font-data);
    font-size: 1.05rem;
    font-weight: 400;
    color: #666666;
    letter-spacing: 0.01em;
}

.numbers-breakdown-value {
    font-family: var(--font-data);
    font-size: 1.1rem;
    font-weight: 700;
    color: #000000;
    margin-left: auto;
}

/* ── Big hero numbers — pinned to baseline ── */

.numbers-hero {
    grid-column: 1;
    grid-row: 1;
    align-self: end;
    display: flex;
    gap: 80px;
}

.numbers-hero-label {
    font-family: var(--font-data);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999999;
    font-weight: 500;
    margin-bottom: 8px;
}

.numbers-hero-value {
    font-family: var(--font-display);
    font-size: 5.5rem;
    font-weight: 400;
    color: #000000;
    line-height: 1;
    letter-spacing: 0.02em;
}

.numbers-hero .delta {
    font-size: 1.1rem;
    font-weight: 500;
    margin-left: 8px;
    vertical-align: super;
}

/* ── 02 Streaming — Metric cards ──────────────────────────────── */

.metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
}

.metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
}

.metric-card-platform {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
}

.metric-card-value {
    font-family: var(--font-data);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
}

.metric-card-label {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
}

.delta { font-family: var(--font-data); }
.delta.positive { color: var(--positive); }
.delta.negative { color: var(--negative); }

/* ── Bar chart ────────────────────────────────────────────────── */

.bar-chart-container { margin-bottom: 40px; }

.bar-chart-title {
    font-family: var(--font-data);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 16px;
    font-weight: 500;
}

.bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 160px;
    padding-bottom: 28px;
    position: relative;
    border-bottom: 1px solid var(--border);
}

.bar {
    flex: 1;
    min-width: 0;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: opacity 0.2s;
    cursor: default;
}

.bar:hover { opacity: 0.8; }

.bar-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%) rotate(-45deg);
    font-family: var(--font-data);
    font-size: 0.5rem;
    color: var(--text-tertiary);
    white-space: nowrap;
    transform-origin: top center;
}

.bar-tooltip {
    display: none;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: var(--bg);
    font-family: var(--font-data);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    z-index: 10;
}

.bar:hover .bar-tooltip { display: block; }

/* ── Top tracks table ─────────────────────────────────────────── */

.tracks-table {
    width: 100%;
    border-collapse: collapse;
}

.tracks-table th {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
}

.tracks-table th:last-child { text-align: right; }

.tracks-table td {
    font-family: var(--font-data);
    font-size: 0.85rem;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
}

.tracks-table td:first-child {
    font-weight: 700;
    color: var(--text-tertiary);
    width: 40px;
}

.tracks-table td:last-child {
    text-align: right;
    color: var(--text-secondary);
}

.track-bar-cell { position: relative; }

.track-bar-bg {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: var(--accent-dim);
    border-radius: 2px;
    width: 100%;
}

.track-bar-fill {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
}

.track-streams {
    position: relative;
    z-index: 1;
}

/* ── 03 Press — cards grid ────────────────────────────────────── */

.press-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.press-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
}

.press-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
}

.press-card:hover { border-color: var(--border-light); }
.press-card-link:hover { border-color: var(--accent); }

.press-card-screenshot {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--surface-elevated);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
}

.press-card-screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.press-card-screenshot-placeholder {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 40%;
}

.press-card-body { padding: 16px; }

.press-card-outlet {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
}

.press-card-headline {
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--text-primary);
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
}

.press-card-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
}

/* ── Press text list (non-featured) ──────────────────────────── */

.press-list {
    margin-top: 24px;
    border-top: 1px solid var(--border);
}

.press-list-row {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
}

.press-list-row-link {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.15s;
}

.press-list-row-link:hover {
    background: var(--surface);
}

.press-list-outlet {
    font-family: var(--font-data);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
}

.press-list-headline {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--text-primary);
    font-weight: 400;
    line-height: 1.4;
}

.press-list-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    white-space: nowrap;
}

/* ── Quotes grid ──────────────────────────────────────────────── */

.quotes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
}

.quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 24px 20px;
    position: relative;
}

.quote-mark {
    font-family: var(--font-display);
    font-size: 5rem;
    color: var(--accent);
    line-height: 0.5;
    position: absolute;
    top: 20px; left: 20px;
    opacity: 0.3;
}

.quote-text {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text-primary);
    line-height: 1.6;
    font-style: italic;
    position: relative;
    z-index: 1;
    margin-bottom: 12px;
    padding-left: 20px;
}

.quote-source {
    font-family: var(--font-data);
    font-size: 0.72rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding-left: 20px;
}

/* ── Playlist grid ────────────────────────────────────────────── */

/* ── Featured Playlist cards (matches Socials Pages pattern) ──── */

.playlist-featured-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 32px;
}

.playlist-featured-card {
    overflow: hidden;
}

.playlist-featured-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
}

.playlist-featured-card-link:hover { opacity: 0.85; }

.playlist-featured-cover {
    width: 100%;
    aspect-ratio: 9 / 16;
    overflow: hidden;
    border-radius: 8px;
    background: transparent;
}

.playlist-featured-cover img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.playlist-featured-body {
    padding: 10px 0 0 18px;
}

.playlist-featured-name {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 3px;
}

.playlist-featured-curator {
    font-family: var(--font-data);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
}

.playlist-featured-followers {
    font-family: var(--font-data);
    font-size: 0.65rem;
    color: var(--text-tertiary);
}

/* ── Playlist DSP grid (Streaming section) ───────────────────── */

.playlist-dsp-grid {
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.playlist-dsp-row {
    display: grid;
    gap: 24px;
}

.playlist-dsp-col {
    min-width: 0;
}

.playlist-dsp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-data);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
}

.playlist-dsp-logo {
    width: 20px;
    height: 20px;
    object-fit: contain;
}

.playlist-dsp-item,
.playlist-dsp-item-link {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 42px;
    padding: 6px 0 6px 2px;
    border-bottom: 1px solid var(--border);
    box-sizing: border-box;
}

.playlist-dsp-item-link {
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    cursor: pointer;
}

.playlist-dsp-item-link:hover {
    background: var(--surface);
}

.playlist-dsp-top-row {

<script>
/**
 * Weekly Report — Report renderer.
 *
 * Renders a polished, dark magazine-style report from JSON data.
 * Used in both the standalone report page and HTML export.
 *
 * Structure:
 *   Nav  — sticky top bar with anchor links
 *   Hero — artist name, campaign, week
 *   01 Numbers      — headline stats
 *   02 Streaming    — DSP metrics, daily chart, top tracks
 *   03 Press & Pages — press articles, quotes, playlists
 *   04 Socials      — social stats, channel posts, creators
 *   05 Radio        — radio plays
 */

(function () {
    'use strict';

    const $root = document.getElementById('report-root');
    if (!$root) return;

    const ALL_SECTIONS = [
        { id: 'numbers',      label: 'Numbers' },
        { id: 'upcoming',     label: 'Upcoming' },
        { id: 'streaming',    label: 'Streaming' },
        { id: 'press',        label: 'Press' },
        { id: 'social_pages', label: 'Socials Pages' },
        { id: 'socials',      label: 'Socials' },
        { id: 'radio',        label: 'Radio' },
        { id: 'club',         label: 'Club' },
        { id: 'quotes',       label: 'Quotes' },
    ];

    // ── Init ──────────────────────────────────────────────────────────

    async function init() {
        let data;

        if (window.__REPORT_DATA__) {
            data = window.__REPORT_DATA__;
        } else {
            const parts = window.location.pathname.split('/');
            const reportId = parts[parts.length - 1];
            if (!reportId) {
                $root.innerHTML = '<p style="color:#999;text-align:center;padding:48px;">No report ID found</p>';
                return;
            }

            try {
                const res = await fetch(`/weekly-report/api/reports/${reportId}`);
                if (!res.ok) throw new Error('Report not found');
                data = await res.json();
            } catch (e) {
                $root.innerHTML = `<p style="color:#999;text-align:center;padding:48px;">Failed to load report: ${e.message}</p>`;
                return;
            }
        }

        renderReport(data);
    }

    // ── Main render ───────────────────────────────────────────────────

    function renderReport(data) {
        const reportId = data._meta?.report_id || '';
        const vis = data.visible_sections || ALL_SECTIONS.map(s => s.id);
        const SECTIONS = vis.map(id => ALL_SECTIONS.find(s => s.id === id)).filter(Boolean);

        const renderers = {
            numbers:      (n) => renderNumbers(data, n),
            upcoming:     (n) => renderUpcoming(data, n, reportId),
            streaming:    (n) => renderStreaming(data, n, reportId),
            press:        (n) => renderPress(data, n, reportId),
            social_pages: (n) => renderSocialPages(data, n, reportId),
            socials:      (n) => renderSocials(data, n, reportId),
            radio:        (n) => renderRadio(data, n),
            club:         (n) => renderClub(data, n),
            quotes:       (n) => renderQuotes(data, n),
        };

        let html = '';
        html += renderNav(data, SECTIONS, reportId);
        html += renderHero(data, reportId);

        SECTIONS.forEach((s, i) => {
            const fn = renderers[s.id];
            if (fn) html += fn(i + 1);
        });

        html += renderFooter(data);

        $root.innerHTML = html;

        // Smooth scrolling for nav links
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) {
                    const navHeight = document.querySelector('.report-nav')?.offsetHeight || 0;
                    const top = target.getBoundingClientRect().top + window.scrollY - navHeight;
                    window.scrollTo({ top, behavior: 'smooth' });
                }
            });
        });

        // Highlight active nav on scroll
        const sections = SECTIONS.map(s => document.getElementById(s.id)).filter(Boolean);
        const links = document.querySelectorAll('.nav-link');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(l => l.classList.remove('active'));
                    const active = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -60% 0px' });

        sections.forEach(s => observer.observe(s));
    }

    // ── Calculated totals ─────────────────────────────────────────────

    function calcTotalStreams(data) {
        const keys = ['spotify_streams', 'apple_streams', 'deezer_streams', 'amazon_streams', 'soundcloud_streams'];
        const vals = keys.map(k => data[k]).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    }

    function calcTotalStreamsAndViews(data) {
        const keys = ['spotify_streams', 'apple_streams', 'deezer_streams', 'amazon_streams', 'soundcloud_streams', 'youtube_streams'];
        const vals = keys.map(k => data[k]).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : data.total_streams ?? null;
    }

    function calcSocialReach(data) {
        // Use socials_card_order if available (matches Socials slide), otherwise fallback
        const keys = (data.socials_card_order && data.socials_card_order.length)
            ? data.socials_card_order
            : ['instagram_followers', 'youtube_subscribers', 'tiktok_followers', 'soundcloud_followers', 'spotify_followers'];
        const vals = keys.map(k => data[k]).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : data.social_reach ?? null;
    }

    // ── Hero ───────────────────────────────────────────────────────────

    function renderHero(data, reportId) {
        const heroImg = data.hero_image
            ? `background-image: url('/weekly-report/api/reports/${reportId}/images/${data.hero_image}')`
            : '';

        // Build overview highlight cards from the overview_highlights array
        const highlights = data.overview_highlights || [];
        const allStats = {
            _total_streams_and_views: { label: 'Total Streams & Views', value: calcTotalStreamsAndViews(data), delta: null },
            total_streams:      { label: 'Total Streams',      value: calcTotalStreams(data),   delta: data.total_streams_delta_pct },
            youtube_streams:    { label: 'Total Video Views',   value: data.youtube_streams,    delta: null },
            monthly_listeners:  { label: 'Monthly Listeners',  value: data.monthly_listeners,  delta: data.monthly_listeners_delta_pct },
            social_reach:       { label: 'Current Social Reach',       value: calcSocialReach(data),   delta: null },
            press_hits:         { label: 'Press Hits',         value: data.press_hits,         delta: null },
            shazam_shazams:     { label: 'Shazam',             value: data.shazam_shazams,     delta: null },
        };

        // Custom text lines lookup
        const customLines = {};
        (data.overview_custom || []).forEach(c => { customLines[c.id] = c; });

        let highlightHTML = '';
        if (highlights.length) {
            const cards = highlights.map(key => {
                // Custom text line?
                const custom = customLines[key];
                if (custom) {
                    return `<div class="hero-highlight-card hero-highlight-custom">
                        <span class="hero-highlight-custom-header">${esc(custom.header)}</span><span class="hero-highlight-custom-sep">:</span> <span class="hero-highlight-custom-text">${esc(custom.text)}</span>
                    </div>`;
                }
                // Stat card
                const s = allStats[key];
                if (!s || !s.value) return '';
                const deltaStr = s.delta != null
                    ? `<span class="hero-highlight-delta ${s.delta >= 0 ? 'positive' : 'negative'}">${s.delta >= 0 ? '+' : ''}${s.delta}%</span>`
                    : '';
                return `<div class="hero-highlight-card">
                    <div class="hero-highlight-value">${fmtNum(s.value)}${deltaStr}</div>
                    <div class="hero-highlight-label">${s.label}</div>
                </div>`;
            }).filter(Boolean).join('');
            if (cards) highlightHTML = `<div class="hero-highlights">${cards}</div>`;
        }

        // hero_opacity 0–100: 100 = full frost (32px blur), 0 = no frost (0px blur)
        const frostPct = (data.hero_opacity ?? 50) / 100;
        const heroBlur = (frostPct * 32).toFixed(1);
        const heroBrightness = (1 - frostPct * 0.08).toFixed(3);  // 1.0 → 0.92

        return `
            <section class="report-hero" style="--hero-blur: ${heroBlur}px; --hero-brightness: ${heroBrightness}">
                <div class="report-hero-bg" style="${heroImg}"></div>
                <div class="report-hero-frost"></div>
                <div class="report-hero-gradient"></div>
                <div class="report-hero-content">
                    <h1 class="report-artist-name">${esc(data.artist_name)}</h1>
                    ${data.song_name ? `<p class="report-song-name">${esc(data.song_name)}</p>` : ''}
                    ${data.campaign_name ? `<p class="report-campaign">${esc(data.campaign_name)}</p>` : ''}
                    <p class="report-week">w/c ${fmtDateLong(data.week_commencing)}</p>
                </div>
                ${highlightHTML}
            </section>
        `;
    }

    function renderNumbers(data, num) {
        const visible = data.numbers_visible || [];

        // Platform breakdown lookup — rendered in numbers_visible order
        const allBreakdown = {
            spotify_streams:           { label: 'Spotify Streams',          value: data.spotify_streams },
            spotify_monthly_listeners: { label: 'Spotify Monthly Listeners', value: data.spotify_monthly_listeners },
            apple_streams:             { label: 'Apple Streams',            value: data.apple_streams },
            deezer_streams:            { label: 'Deezer Streams',           value: data.deezer_streams },
            amazon_streams:            { label: 'Amazon Streams',           value: data.amazon_streams },
            youtube_streams:           { label: 'YouTube Views',            value: data.youtube_streams },
            soundcloud_streams:        { label: 'SoundCloud Streams',        value: data.soundcloud_streams },
            instagram_followers:       { label: 'Instagram Followers',      value: data.instagram_followers },
            youtube_subscribers:       { label: 'YouTube Subscribers',      value: data.youtube_subscribers },
            tiktok_followers:          { label: 'TikTok Followers',         value: data.tiktok_followers },
            shazam_shazams:            { label: 'Shazam',                   value: data.shazam_shazams },
        };
        // If nothing toggled on, show all fields that have data — DSPs first (desc), then socials (desc)
        const DSP_KEYS = ['spotify_streams', 'spotify_monthly_listeners', 'apple_streams', 'deezer_streams', 'amazon_streams', 'youtube_streams', 'soundcloud_streams', 'shazam_shazams'];
        const SOCIAL_KEYS = ['instagram_followers', 'tiktok_followers', 'youtube_subscribers'];
        let keys;
        if (visible.length) {
            keys = visible;
        } else {
            const dspWithData = DSP_KEYS.filter(k => allBreakdown[k]?.value != null)
                .sort((a, b) => (allBreakdown[b].value || 0) - (allBreakdown[a].value || 0));
            const socialWithData = SOCIAL_KEYS.filter(k => allBreakdown[k]?.value != null)
                .sort((a, b) => (allBreakdown[b].value || 0) - (allBreakdown[a].value || 0));
            keys = [...dspWithData, ...socialWithData];
        }
        const breakdownLines = keys
            .map(key => { const info = allBreakdown[key]; return info && info.value ? { key, label: info.label, value: info.value } : null; })
            .filter(Boolean);

        const breakdownHTML = breakdownLines.map(l => `
            <div class="numbers-breakdown-row">
                <span class="numbers-breakdown-icon">${PLATFORM_ICONS[l.key] || ''}</span>
                <span class="numbers-breakdown-label">${l.label}</span>
                <span class="numbers-breakdown-value">${fmtNum(l.value)}</span>
            </div>
        `).join('');

        // Hero numbers (bottom)
        const heroNumbers = [];
        const combined = calcTotalStreamsAndViews(data);
        if (combined) {
            heroNumbers.push({ label: 'Total Streams & Views', value: combined });
        }
        const socialReach = calcSocialReach(data);
        if (socialReach) {
            heroNumbers.push({ label: 'Current Social Reach', value: socialReach });
        }

        const heroHTML = heroNumbers.map(h => `
            <div class="numbers-hero-stat">
                <div class="numbers-hero-label">${h.label}</div>
                <div class="numbers-hero-value">${fmtNum(h.value)}${h.delta != null ? ' ' + fmtDelta(h.delta) : ''}</div>
            </div>
        `).join('');

        const content = `
            <div class="numbers-layout">
                ${breakdownHTML ? `<div class="numbers-breakdown">${breakdownHTML}</div>` : ''}
                ${heroHTML ? `<div class="numbers-hero">${heroHTML}</div>` : ''}
            </div>
        `;

        return sectionWrap(num, 'Numbers', content, 'numbers');
    }

    // ── Upcoming ──────────────────────────────────────────────────────

    function renderUpcoming(data, num, reportId) {
        const images = data.upcoming_images || [];
        const lines = data.upcoming_lines || [];
        if (!images.length && !lines.length) return '';

        const imagesHTML = images.filter(img => img.image).map(img =>
            `<div class="upcoming-image-card">
                <img src="/weekly-report/api/reports/${reportId}/images/${img.image}" alt="">
            </div>`
        ).join('');

        const linesHTML = lines.map(line =>
            `<div class="upcoming-text-line">
                <div class="upcoming-text-header">${esc(line.header)}</div>
                <div class="upcoming-text-body">${esc(line.text)}</div>
            </div>`
        ).join('');

        const content = `
            <div class="upcoming-layout">
                <div class="upcoming-left">${imagesHTML}</div>
                <div class="upcoming-divider"></div>
                <div class="upcoming-right">${linesHTML}</div>
            </div>
        `;

        return sectionWrap(num, 'Upcoming', content, 'upcoming');
    }

    // ── 02 Streaming ──────────────────────────────────────────────────

    // DSP column order — two rows of three
    const DSP_GRID = [
        ['spotify', 'apple_music', 'amazon_music'],
        ['deezer', 'soundcloud', 'youtube_music'],

    function renderStreaming(data, num, reportId) {
        let content = '';

        // DSP metric cards
        if (data.streaming?.length) {
            content += '<div class="metric-grid">';
            for (const s of data.streaming) {
                content += `
                    <div class="metric-card">
                        <div class="metric-card-platform">${platformLabel(s.platform)}</div>
                        <div class="metric-card-value">${fmtNum(s.weekly_streams)}</div>
                        <div class="metric-card-label">Weekly Streams ${s.weekly_streams_delta_pct != null ? fmtDelta(s.weekly_streams_delta_pct) : ''}</div>
                    </div>
                `;
            }
            content += '</div>';
        }

        // Playlist support — featured cards + grouped by DSP in a 3-column grid
        if (data.playlists?.length) {
            if (content) content += '<div class="subsection-divider"></div>';

            // Featured playlists → visual cards (max 6)
            const featuredPlaylists = data.playlists.filter(p => p.featured && !p.ended).slice(0, 6);
            if (featuredPlaylists.length) {
                content += '<div class="playlist-featured-grid">';
                content += featuredPlaylists.map(p => {
                    const coverHtml = p.cover_image
                        ? `<img src="/weekly-report/api/reports/${reportId}/images/${p.cover_image}" alt="${esc(p.playlist_name)}">`
                        : `<span class="press-card-screenshot-placeholder">${platformLabel(p.dsp)}</span>`;

                    const inner = `
                        <div class="playlist-featured-cover">${coverHtml}</div>
                        <div class="playlist-featured-body">
                            <div class="playlist-featured-curator">${platformLabel(p.dsp)}</div>
                            <div class="playlist-featured-name">${esc(p.playlist_name)}</div>
                            ${p.followers ? `<div class="playlist-featured-followers">${fmtNum(p.followers)} followers</div>` : ''}
                        </div>`;

                    return p.url
                        ? `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="playlist-featured-card playlist-featured-card-link">${inner}</a>`
                        : `<div class="playlist-featured-card">${inner}</div>`;
                }).join('');
                content += '</div>';
            }

            // Group playlists by DSP, removed items sorted to end
            const byDsp = {};
            for (const p of data.playlists) {
                const dsp = p.dsp || 'other';
                if (!byDsp[dsp]) byDsp[dsp] = [];
                byDsp[dsp].push(p);
            }
            for (const dsp in byDsp) {
                byDsp[dsp].sort((a, b) => {
                    if (a.ended !== b.ended) return a.ended ? 1 : -1;
                    if (a.followers && b.followers) return b.followers - a.followers;
                    if (a.followers) return -1;
                    if (b.followers) return 1;
                    return (a.playlist_name || '').localeCompare(b.playlist_name || '');
                });
            }

            // Build DSP columns — only show DSPs that have playlists
            content += '<div class="playlist-dsp-grid">';
            for (const row of DSP_GRID) {
                const activeCols = row.filter(dsp => byDsp[dsp]?.length);
                if (!activeCols.length) continue;

                content += `<div class="playlist-dsp-row" style="grid-template-columns: repeat(3, 1fr);">`;
                for (const dsp of activeCols) {
                    content += `<div class="playlist-dsp-col">`;
                    content += `<div class="playlist-dsp-header">
                        ${DSP_LOGO[dsp] ? `<img class="playlist-dsp-logo" src="${DSP_LOGO[dsp]}" alt="">` : ''}
                        <span>${platformLabel(dsp)}</span>
                    </div>`;
                    content += `<div class="playlist-dsp-list">`;
                    for (const p of byDsp[dsp]) {
                        const endedClass = p.ended ? ' playlist-ended' : '';
                        const link = (p.url && !p.ended)
                            ? `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="playlist-dsp-item-link${endedClass}">`
                            : `<div class="playlist-dsp-item${endedClass}">`;
                        const closeTag = (p.url && !p.ended) ? '</a>' : '</div>';
                        const endedLabel = p.ended && p.followers ? ' <em class="playlist-prev-label">(previously featured)</em>' : '';
                        content += `${link}
                            <div class="playlist-dsp-top-row">
                                <div class="playlist-dsp-name">${esc(p.playlist_name)}</div>
                                ${p.followers ? `<div class="playlist-dsp-followers">${fmtNum(p.followers)} followers${endedLabel}</div>` : (p.ended ? `<div class="playlist-dsp-followers"><em class="playlist-prev-label">(previously featured)</em></div>` : '')}
                            </div>
                            ${p.curator ? `<div class="playlist-dsp-curator">${esc(p.curator)}</div>` : ''}
                        ${closeTag}`;
                    }
                    content += '</div></div>';
                }
                content += '</div>';
            }
            content += '</div>';
        }

        // Daily streams bar chart
        if (data.daily_streams?.length) {
            if (content) content += '<div class="subsection-divider"></div>';
            const max = Math.max(...data.daily_streams.map(d => d.streams));
            content += `
                <div class="bar-chart-container">
                    <div class="bar-chart-title">Daily Streams — Last ${data.daily_streams.length} Days</div>
                    <div class="bar-chart">
                        ${data.daily_streams.map(d => {
                            const pct = max > 0 ? (d.streams / max * 100) : 0;
                            const dateLabel = d.date.slice(5);
                            return `
                                <div class="bar" style="height: ${pct}%;">
                                    <div class="bar-tooltip">${fmtNum(d.streams)}</div>
                                    <div class="bar-label">${dateLabel}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // Top tracks table
        if (data.top_tracks?.length) {
            if (content) content += '<div class="subsection-divider"></div>';
            const maxStreams = Math.max(...data.top_tracks.map(t => t.weekly_streams || 0));
            content += `
                <table class="tracks-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Track</th>
                            <th>Weekly Streams</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.top_tracks.map(t => {
                            const pct = maxStreams > 0 ? ((t.weekly_streams || 0) / maxStreams * 100) : 0;
                            return `
                                <tr>
                                    <td>${t.rank}</td>
                                    <td>${esc(t.title)}</td>
                                    <td class="track-bar-cell">
                                        <div class="track-bar-bg"></div>
                                        <div class="track-bar-fill" style="width: ${pct}%;"></div>
                                        <span class="track-streams">${fmtNum(t.weekly_streams)}</span>
                                    </td>
                                    <td>${fmtNum(t.total_streams)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        if (!content) content = '<p class="section-empty">No streaming data yet</p>';

        return sectionWrap(num, 'Streaming', content, 'streaming');
    }

    // ── 03 Press ────────────────────────────────────────────────────────

    function renderPress(data, num, reportId) {
        let content = '';

        if (data.press?.length) {
            const featured = data.press.filter(p => p.featured).slice(0, 6);
            const listed = data.press.filter(p => !p.featured);

            if (featured.length) {
                content += '<div class="press-grid">';
                content += featured.map(item => {
                    const screenshotHtml = item.screenshot
                        ? `<img src="/weekly-report/api/reports/${reportId}/images/${item.screenshot}" alt="${esc(item.headline)}">`
                        : `<span class="press-card-screenshot-placeholder">Screenshot</span>`;

                    const inner = `
                        <div class="press-card-screenshot">${screenshotHtml}</div>
                        <div class="press-card-body">
                            <div class="press-card-outlet">${esc(item.outlet)}</div>
                            <div class="press-card-headline">${esc(item.headline)}</div>
                            <div class="press-card-date">${fmtDate(item.date)}</div>
                        </div>`;

                    return item.url
                        ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="press-card press-card-link">${inner}</a>`
                        : `<div class="press-card">${inner}</div>`;
                }).join('');
                content += '</div>';
            }

            if (listed.length) {
                content += '<div class="press-list">';
                content += listed.map(item => {
                    const inner = `
                        <div class="press-list-outlet">${esc(item.outlet)}</div>
                        <div class="press-list-headline">${esc(item.headline)}</div>
                        <div class="press-list-date">${fmtDate(item.date)}</div>`;

                    return item.url
                        ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="press-list-row press-list-row-link">${inner}</a>`
                        : `<div class="press-list-row">${inner}</div>`;
                }).join('');
                content += '</div>';
            }
        }

        if (!content) content = '<p class="section-empty">No press yet</p>';

        return sectionWrap(num, 'Press', content, 'press');
    }

    // ── 04 Socials Pages ────────────────────────────────────────────────

    function renderSocialPages(data, num, reportId) {
        let content = '';

        // Combine social_channels + creators into one unified list
        const allItems = [
            ...(data.social_channels || []).map(c => ({ ...c, _name: c.account_name })),
            ...(data.creators || []).map(c => ({ ...c, _name: c.creator_name })),
        ];

        const featured = allItems.filter(i => i.featured);
        const listed = allItems.filter(i => !i.featured);

        // Featured items → visual cards
        if (featured.length) {
            content += '<div class="social-channel-grid">';
            content += featured.map(item => {
                const screenshotHtml = item.screenshot
                    ? `<img src="/weekly-report/api/reports/${reportId}/images/${item.screenshot}" alt="${esc(item._name)}">`
                    : `<span class="press-card-screenshot-placeholder">${platformLabel(item.platform)}</span>`;

                const inner = `
                    <div class="social-channel-card-screenshot">${screenshotHtml}</div>
                    <div class="social-channel-card-body">
                        <div class="social-channel-card-platform">${platformLabel(item.platform)}</div>
                        <div class="social-channel-card-account">${esc(item._name)}</div>
                        ${item.description ? `<div class="social-channel-card-desc">${esc(item.description)}</div>` : ''}
                        ${item.date ? `<div class="social-channel-card-date">${fmtDate(item.date)}</div>` : ''}
                    </div>`;

                return item.url
                    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="social-channel-card social-channel-card-link">${inner}</a>`
                    : `<div class="social-channel-card">${inner}</div>`;
            }).join('');
            content += '</div>';
        }

        // Non-featured items → simple list: "Platform: Name"
        if (listed.length) {
            content += '<div class="social-channel-list">';
            content += listed.map(item => {
                const inner = `
                    <span class="social-channel-list-platform">${platformLabel(item.platform)}</span>
                    <span class="social-channel-list-name">${esc(item._name)}</span>`;

                return item.url
                    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="social-channel-list-row social-channel-list-row-link">${inner}</a>`
                    : `<div class="social-channel-list-row">${inner}</div>`;
            }).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No socials pages yet</p>';

        return sectionWrap(num, 'Socials Pages', content, 'social_pages');
    }

    function parseGrowthNum(g) {
        if (!g) return 0;
        const cleaned = g.replace(/[,+\s]/g, '');
        const m = cleaned.match(/^(-?\d*\.?\d+)(K|M)?$/i);
        if (!m) return 0;
        let n = parseFloat(m[1]);
        if (m[2]?.toUpperCase() === 'K') n *= 1000;
        if (m[2]?.toUpperCase() === 'M') n *= 1000000;
        return n;
    }

    // Detect platform from URL
    function detectPlatformFromUrl(url) {
        if (!url) return null;
        const u = url.toLowerCase();
        if (u.includes('instagram.com')) return 'instagram';
        if (u.includes('tiktok.com')) return 'tiktok';
        if (u.includes('twitter.com') || u.includes('x.com')) return 'twitter';
        if (u.includes('snapchat.com')) return 'snapchat';
        if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
        if (u.includes('facebook.com')) return 'facebook';
        return null;
    }

        views:    '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>',

    };

    function renderSocials(data, num, reportId) {
        const defaultOrder = ['instagram_followers', 'tiktok_followers', 'youtube_subscribers', 'spotify_followers', 'soundcloud_followers'];
        const order = (data.socials_card_order && data.socials_card_order.length) ? data.socials_card_order : defaultOrder;

        const growth = data.socials_growth || {};
        const urls = data.socials_urls || {};

        // Total social reach — sum all platform follower values shown on this slide
        const reachVals = order.map(k => data[k]).filter(v => v != null);
        const totalReach = reachVals.length ? reachVals.reduce((a, b) => a + b, 0) : null;

        // Total social growth — only sum positive growth
        const totalGrowth = Object.values(growth).reduce((sum, g) => {
            const v = parseGrowthNum(g);
            return v > 0 ? sum + v : sum;
        }, 0);

        const rows = order.map(key => {
            const def = SOCIAL_CARDS[key];
            if (!def) return '';
            const val = data[key];
            if (val == null) return '';
            const g = growth[key];
            const isPositive = g && parseGrowthNum(g) > 0;
            const growthHtml = isPositive ? `<span class="socials-breakdown-growth">${esc(g)}</span>` : '';
            const url = urls[key];
            const labelText = `${def.label}: ${def.metric}`;
            const labelHtml = url
                ? `<a href="${esc(url)}" target="_blank" class="socials-breakdown-label">${labelText}</a>`
                : `<span class="socials-breakdown-label">${labelText}</span>`;
            return `
                <div class="socials-breakdown-row">
                    <span class="socials-breakdown-icon">${def.icon}</span>
                    ${labelHtml}
                    ${growthHtml}
                    <span class="socials-breakdown-value">${fmtNum(val)}</span>
                </div>`;
        }).filter(Boolean).join('');

        // Hero numbers (below breakdown, side by side)
        const heroStats = [];
        if (totalReach) {
            heroStats.push({ label: 'Total Social Reach', value: fmtNum(totalReach) });
        }
        if (totalGrowth) {
            heroStats.push({ label: 'Total Social Growth', value: '+' + totalGrowth.toLocaleString() });
        }

        const heroHTML = heroStats.map(h => `
            <div class="socials-hero-stat">
                <div class="socials-hero-label">${h.label}</div>
                <div class="socials-hero-value">${h.value}</div>
            </div>
        `).join('');

        // Social images grid (left column)
        const socialsImages = data.socials_images || [];
        let imagesHTML = '';
        if (socialsImages.length) {
            const cards = socialsImages.map(img => {
                if (!img.image) return '';
                const src = `/weekly-report/api/reports/${reportId}/images/${img.image}`;
                const platform = detectPlatformFromUrl(img.url);
                const platformIcon = platform && PLATFORM_MINI_ICONS[platform]
                    ? `<span class="socials-img-platform-icon">${PLATFORM_MINI_ICONS[platform]}</span>`
                    : '';
                const metrics = [];
                if (img.views)    metrics.push(`<span class="socials-img-metric">${platformIcon}${METRIC_ICONS.views}<span>${fmtNum(img.views)}</span></span>`);
                if (img.likes)    metrics.push(`<span class="socials-img-metric">${METRIC_ICONS.likes}<span>${fmtNum(img.likes)}</span></span>`);
                if (img.comments) metrics.push(`<span class="socials-img-metric">${METRIC_ICONS.comments}<span>${fmtNum(img.comments)}</span></span>`);
                const imgTag = img.url
                    ? `<a href="${esc(img.url)}" target="_blank" rel="noopener"><img class="socials-img-thumb" src="${src}" alt=""></a>`
                    : `<img class="socials-img-thumb" src="${src}" alt="">`;
                return `<div class="socials-img-card">
                    ${imgTag}
                    ${metrics.length ? `<div class="socials-img-metrics">${metrics.join('')}</div>` : ''}
                </div>`;
            }).filter(Boolean).join('');
            if (cards) imagesHTML = `<div class="socials-img-grid">${cards}</div>`;
        }

        const breakdownHTML = rows
            ? `<div class="socials-breakdown">${rows}</div>`
            : '<p class="section-empty">No social data yet</p>';

        const content = `
            <div class="socials-layout">
                ${imagesHTML ? `<div class="socials-img-area">${imagesHTML}</div>` : ''}
                <div class="socials-right-col">
                    ${breakdownHTML}
                    ${heroHTML ? `<div class="socials-hero">${heroHTML}</div>` : ''}
                </div>
            </div>
        `;

        return sectionWrap(num, 'Socials', content, 'socials');
    }

    function socialRow(label, value, delta) {
        const deltaHtml = delta != null
            ? ` <span class="delta ${delta >= 0 ? 'positive' : 'negative'}">${delta >= 0 ? '+' : ''}${fmtNum(delta)}</span>`
            : '';
        return `
            <div class="social-stat-row">
                <span class="social-stat-label">${label}</span>
                <span class="social-stat-value">${value}${deltaHtml}</span>
            </div>
        `;
    }

    // ── 05 Radio ──────────────────────────────────────────────────────

    function renderRadio(data, num) {
        let content = '';

        if (data.radio?.length) {
            content += '<div class="radio-grid">';
            content += data.radio.map(r => `
                <div class="radio-card">
                    <div class="radio-card-station">${esc(r.station)}</div>
                    ${r.show ? `<div class="radio-card-show">${esc(r.show)}</div>` : ''}
                    ${r.date ? `<div class="radio-card-date">${fmtDate(r.date)}</div>` : ''}
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No radio data yet</p>';

        return sectionWrap(num, 'Radio', content, 'radio');
    }

    // ── 07 Club ──────────────────────────────────────────────────────

    function renderClub(data, num) {
        let content = '';

        if (data.club?.length) {
            content += '<div class="radio-grid">';
            content += data.club.map(c => `
                <div class="radio-card">
                    <div class="radio-card-station">${esc(c.venue)}</div>
                    ${c.event ? `<div class="radio-card-show">${esc(c.event)}</div>` : ''}
                    ${c.dj ? `<div class="radio-card-date">DJ: ${esc(c.dj)}</div>` : ''}
                    ${c.date ? `<div class="radio-card-date">${fmtDate(c.date)}</div>` : ''}
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No club data yet</p>';

        return sectionWrap(num, 'Club', content, 'club');
    }

    // ── 08 Quotes ────────────────────────────────────────────────────

    function renderQuotes(data, num) {
        let content = '';

        if (data.quotes?.length) {
            content += '<div class="quotes-grid">';
            content += data.quotes.map(q => `
                <div class="quote-card">
                    <div class="quote-mark">\u201C</div>
                    <div class="quote-text">${esc(q.text)}</div>
                    <div class="quote-source">${esc(q.source)}</div>
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No quotes yet</p>';

        return sectionWrap(num, 'Quotes', content, 'quotes');
    }

    // ── Footer ────────────────────────────────────────────────────────

    function renderFooter(data) {
        return `
            <footer class="report-footer">
                <p class="report-footer-text">Prepared for internal use — Confidential</p>
                <p class="report-footer-text" style="margin-top: 4px; opacity: 0.5;">${esc(data.artist_name)} Weekly Report — ${fmtDate(data.week_commencing)}</p>
            </footer>
        `;
    }

    // ── Helpers ────────────────────────────────────────────────────────

    function sectionWrap(num, title, content, id) {
        const numStr = String(num).padStart(2, '0');
        return `
            <section class="report-section" id="${id || ''}">
                <div class="report-section-header">
                    <span class="report-section-number">${numStr}</span>
                    <span class="report-section-divider">—</span>
                    <span class="report-section-title">${title}</span>
                </div>
                <div class="report-section-content">
                    ${content}
                </div>
            </section>
        `;
    }

    function fmtNum(n) {
        if (n == null) return '—';
        if (Math.abs(n) >= 1_000_000) { const v = (n / 1_000_000).toFixed(1); return (v.endsWith('.0') ? v.slice(0, -2) : v) + 'M'; }
        if (Math.abs(n) >= 1_000) { const v = (n / 1_000).toFixed(1); return (v.endsWith('.0') ? v.slice(0, -2) : v) + 'K'; }
        return n.toLocaleString();
    }

    function fmtDelta(pct) {
        if (pct == null) return '';
        const sign = pct >= 0 ? '+' : '';
        const cls = pct >= 0 ? 'positive' : 'negative';
        return `<span class="delta ${cls}">${sign}${pct.toFixed(1)}%</span>`;
    }

    function fmtDateLong(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        const month = d.toLocaleDateString('en-US', { month: 'long' });
        const day = d.getDate();
        const year = d.getFullYear();
        const suffix = [,'st','nd','rd'][day % 10 > 3 ? 0 : (day % 100 - day % 10 !== 10) * (day % 10)] || 'th';
        return `${month} ${day}${suffix}, ${year}`;
    }

    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function esc(s) {
        if (s == null) return '';
        if (typeof s !== 'string') s = String(s);
        return s
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function platformLabel(p) {
        const labels = {
            spotify: 'Spotify',
            apple_music: 'Apple Music',
            amazon_music: 'Amazon Music',
            youtube_music: 'YouTube',
            youtube: 'YouTube',
            deezer: 'Deezer',
            soundcloud: 'SoundCloud',
            instagram: 'Instagram',
            twitter: 'X / Twitter',
            tiktok: 'TikTok',
        };
        return labels[p] || p;
    }

    // ── Start ─────────────────────────────────────────────────────────
    init();

})();

;(function(){
                // Rewrite image srcs to base64 after render
                const d = window.__REPORT_DATA__;
                if (!d) return;
                const rid = d._meta?.report_id || '';
                const base = '/weekly-report/api/reports/' + rid + '/images/';

                // Hero bg
                if (d._hero_image_b64) {
                    const el = document.querySelector('.report-hero-bg');
                    if (el) el.style.backgroundImage = 'url(' + d._hero_image_b64 + ')';
                }

                // All img tags with src starting with base
                document.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    if (!src || !src.startsWith(base)) return;
                    const filename = src.slice(base.length);

                    // Press & social channel screenshots
                    for (const list of [d.press, d.social_channels, d.creators]) {
                        for (const item of (list || [])) {
                            if (item.screenshot === filename && item._screenshot_b64) {
                                img.src = item._screenshot_b64;
                                return;
                            }
                        }
                    }

                    // Socials images
                    for (const si of (d.socials_images || [])) {
                        if (si.image === filename && si._image_b64) {
                            img.src = si._image_b64;
                            return;
                        }
                    }

                    // Upcoming images
                    for (const ui of (d.upcoming_images || [])) {
                        if (ui.image === filename && ui._image_b64) {
                            img.src = ui._image_b64;
                            return;
                        }
                    }

                    // Brand logo
                    if (d.brand_logo === filename && d._brand_logo_b64) {
                        img.src = d._brand_logo_b64;
                        return;
                    }
                });
            })();
</script>
